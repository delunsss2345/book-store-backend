name: CI

on:
  pull_request:
    branches:
      - dev
      - main
      - production
  push:
    branches:
      - dev
      - main
      - production

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      NODE_ENV: test
      PORT: 3301
      GLOBAL_PREFIX: api/v1
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/nest_auth
      ACCESS_TOKEN_SECRET: ci_access_secret
      ACCESS_TOKEN_TIME: '900'
      REFRESH_TOKEN_SECRET: ci_refresh_secret
      REFRESH_TOKEN_TIME: '2592000'
      OTP_TIME: '300'
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: '6379'
      REDIS_USERNAME: default
      REDIS_PASSWORD: ci_redis_password
      MAIL_HOST: smtp.example.com
      MAIL_PORT: '587'
      MAIL_SECURE: 'false'
      MAIL_USER: ci@example.com
      MAIL_PASS: ci_password
      MAIL_FROM: ci@example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit test
        run: npm run test -- --runInBand --passWithNoTests

      - name: Build
        run: npm run build
