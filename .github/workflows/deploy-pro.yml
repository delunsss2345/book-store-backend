name: CD Production

on:
  workflow_dispatch:
  push:
    branches:
      - production

concurrency:
  group: production-deploy
  # Tắt cancel-in-progress để tránh làm sập DB nếu có nhiều luồng deploy cùng lúc
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_uri: ${{ steps.meta.outputs.tags }} # xuất ra tags này là sha cuối cùng build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # tag format (sẽ có 2 tag khác nhau)
          # ghcr.io/delunsss2345/book-store-backend:a1b2c3d
          # ghcr.io/delunsss2345/book-store-backend:production
          tags: |
            type=sha
      # build nhiều ngôn ngữ và platforms: linux/amd64,linux/arm64
      - name: Set up QEMU & Buildx
        uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Đăng nhập GHCR trên GitHub Actions
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      # Build image
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env and secrets
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          printf '%s' "$PROD_ENV_FILE" > .env.prod
          chmod 600 .env.prod

      - name: Start SSH agent & Add Known Hosts
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR || '/srv/app' }}
          EC2_HEALTHCHECK_URL: ${{ secrets.EC2_HEALTHCHECK_URL || 'http://127.0.0.1:3301/api/v1/health' }}
          IMAGE_URI: ${{ needs.build.outputs.image_uri }} # lấy đúng image vừa build xong
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

          ssh "$EC2_USER@$EC2_HOST" "mkdir -p $EC2_APP_DIR"
          scp .env.prod docker-compose.prod.yml "$EC2_USER@$EC2_HOST:$EC2_APP_DIR/"
          # EOF là heredoc -> tác dụng sẽ giúp ghi nguyên 1 khối vào EC2
          ssh "$EC2_USER@$EC2_HOST" "EC2_APP_DIR='$EC2_APP_DIR' IMAGE_URI='$IMAGE_URI' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' bash -s" << 'EOF'
            set -euo pipefail

            cd "$EC2_APP_DIR" 
            
            # 1. ghi vào file .env.prod để lưu lại (tìm và thay thế)
            sed -i '/^APP_IMAGE=/d' .env.prod
            
            # ghi thêm 1 dòng vào cuối file
            echo "APP_IMAGE=$IMAGE_URI" >> .env.prod
            
            # 2. export để docker compose đọc được
            export APP_IMAGE="$IMAGE_URI"
            
            # login và Pull image (stout ghcr_token load vào --password-stdin stdin)
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            
            # 3. load cờ env file với docker compose
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull app
            docker compose -f docker-compose.prod.yml --env-file .env.prod run --rm app npx prisma migrate deploy
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --remove-orphans
            docker image prune -af
          EOF

      - name: Check Health
        env:
          EC2_HEALTHCHECK_URL: ${{ secrets.EC2_HEALTHCHECK_URL || 'http://127.0.0.1:3301/api/v1/docs' }}
        run: |
          # MySQL cần 10-30s để healthy, NestJS cần vài giây để boot. 
          # Chờ hẳn 45 giây cho chắc ăn, tránh bị curl(7) connection refused.
          echo "Đang chờ Database và App khởi động..."
          sleep 45
          curl -fsS "$EC2_HEALTHCHECK_URL" >/dev/null && echo "✅ Deployment Healthy!"
