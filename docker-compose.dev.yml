services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - .env.testing.local
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - '127.0.0.1:3306:3306'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.testing.local
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - '3301:3301'

volumes:
  # Khai báo volume chính thức
  mysql_data:
