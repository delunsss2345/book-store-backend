name: CD Production

on:
  workflow_dispatch:
  push:
    branches:
      - production

concurrency:
  group: production-deploy
  # Tắt cancel-in-progress để tránh làm sập DB nếu có nhiều luồng deploy cùng lúc
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_uri: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repository name
        id: format_repo
        # Ép tên repo về chữ thường bằng lệnh tr để an toàn 100% trên mọi runner
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lc=$REPO_LC" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.format_repo.outputs.repo_lc }}
          tags: |
            type=sha,format=short
            type=raw,value=production

      - name: Set up QEMU & Buildx
        uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase and short sha
        id: format_vars
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "repo_lc=$REPO_LC" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Prepare env and secrets
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          printf '%s' "$PROD_ENV_FILE" > .env.prod
          chmod 600 .env.prod

      - name: Start SSH agent & Add Known Hosts
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_GITHUB || secrets.GITHUB_SSH_PRIVATE_KEY || secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR || '/srv/app' }}
          EC2_HEALTHCHECK_URL: ${{ secrets.EC2_HEALTHCHECK_URL || 'http://127.0.0.1:3301/api/v1/docs' }}
          IMAGE_URI: ghcr.io/${{ steps.format_vars.outputs.repo_lc }}:sha-${{ steps.format_vars.outputs.short_sha }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          # 1. Quét IP đưa vào known_hosts để không bị prompt (y/n)
          ssh-keyscan -p "$EC2_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

          # 2. Tạo thư mục nếu chưa có và copy compose file + env sang server
          ssh -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" "mkdir -p $EC2_APP_DIR"
          scp -P "$EC2_PORT" .env.prod docker-compose.prod.yml "$EC2_USER@$EC2_HOST:$EC2_APP_DIR/"

          # 3. Chạy script deploy qua SSH
          ssh -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" "EC2_APP_DIR='$EC2_APP_DIR' IMAGE_URI='$IMAGE_URI' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' bash -s" << 'EOF'
            set -euo pipefail
            cd "$EC2_APP_DIR"
            
            # Ghi cứng APP_IMAGE vào .env.prod để sau này gõ docker compose logs app không bị báo lỗi thiếu biến
            sed -i '/^APP_IMAGE=/d' .env.prod
            echo "APP_IMAGE=$IMAGE_URI" >> .env.prod
            
            # Login và Pull image mới nhất
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose -f docker-compose.prod.yml pull app
            
            # Chạy Migrate DB trước khi start app
            docker compose -f docker-compose.prod.yml run --rm app npx prisma migrate deploy
            
            # Start app và dọn dẹp image cũ
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -af
          EOF

      - name: Check Health
        env:
          EC2_HEALTHCHECK_URL: ${{ secrets.EC2_HEALTHCHECK_URL || 'http://127.0.0.1:3301/api/v1/docs' }}
        run: |
          # MySQL cần 10-30s để healthy, NestJS cần vài giây để boot. 
          # Chờ hẳn 45 giây cho chắc ăn, tránh bị curl(7) connection refused.
          echo "Đang chờ Database và App khởi động..."
          sleep 45
          curl -fsS "$EC2_HEALTHCHECK_URL" >/dev/null && echo "✅ Deployment Healthy!"
