name: CD Production

on:
  workflow_dispatch:
  push:
    branches:
      - production

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    outputs:
      image_uri: ${{ steps.set-image.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Image URI
        id: set-image
        run: echo "uri=ghcr.io/${{ github.repository }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect pushed image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy files
        run: |
          set -euo pipefail

          rm -rf deploy-package
          mkdir -p deploy-package/nginx/conf.d

          cp docker-compose.prod.yml deploy-package/docker-compose.yml
          cp -r nginx/conf.d/. deploy-package/nginx/conf.d/
          printf '%s' '${{ secrets.PROD_ENV_FILE }}' > deploy-package/env.prod

          find deploy-package -maxdepth 4 -type f -print

      - name: Upload deploy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: 'deploy-package/*'
          target: '/tmp/bookstore-deploy' # gọt bỏ deploy-package/ để tránh tạo thư mục con trên EC2
          strip_components: 1
          rm: true # xóa các file cũ trên EC2 trước khi upload, tránh tồn đọng file không cần thiết

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY  }}
          port: 22
          script: |
            set -euo pipefail

            sudo mkdir -p /srv/app && sudo chown "$USER":"$USER" /srv/app 
            sudo rm -rf /srv/app/* # xóa sạch thư mục trước khi copy, tránh tồn đọng file không cần thiết
            sudo cp -r /tmp/bookstore-deploy/. /srv/app/ 
            sudo cp -r /tmp/bookstore-deploy/env.prod /srv/app/.env.prod

            cd /srv/app
            ls -la /srv/app

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            cat >> .env.prod <<'EOF'
                APP_IMAGE=${{ needs.build.outputs.image_uri }}
            EOF

            docker compose --env-file .env.prod pull --quiet
            docker compose --env-file .env.prod up -d --remove-orphans
            docker compose --env-file .env.prod ps
            sleep 20
            docker compose --env-file .env.prod logs --tail=200
