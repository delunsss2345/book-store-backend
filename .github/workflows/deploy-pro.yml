name: CD Production

on:
  workflow_dispatch:
  push:
    branches:
      - production

concurrency:
  group: production-deploy
  # Tắt cancel-in-progress để các luồng deploy xếp hàng tuần tự.
  # Tại sao: Nếu có 2 người merge code liên tục, việc ngắt ngang tiến trình deploy
  # trước đó (đặc biệt là lúc đang chạy Prisma migration) sẽ làm sập database.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_uri: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repository name
        id: format_repo
        # Tại sao: Docker quy định tên repository bắt buộc phải là chữ viết thường.
        # Dùng lệnh `tr` thay vì bashism `${VAR,,}` để đảm bảo nó chạy đúng 100% trên mọi loại server/runner.
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lc=$REPO_LC" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.format_repo.outputs.repo_lc }}
          tags: |
            type=sha,format=short
            type=raw,value=production

      - name: Set up QEMU & Buildx
        uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase and short sha
        id: format_vars
        # Tại sao phải khai báo lại: Mỗi `job` chạy trên một máy ảo (runner) độc lập.
        # Biến ở job `build` không tự động sang đây, nên ta cần cắt lại chữ thường và 7 ký tự SHA (để khớp tag Docker).
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "repo_lc=$REPO_LC" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Prepare env and secrets
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          printf '%s' "$PROD_ENV_FILE" > .env.prod
          chmod 600 .env.prod

      - name: Start SSH agent & Add Known Hosts
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_GITHUB || secrets.GITHUB_SSH_PRIVATE_KEY || secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR || '/srv/app' }}
          EC2_HEALTHCHECK_URL: ${{ secrets.EC2_HEALTHCHECK_URL || 'http://127.0.0.1:3301/api/v1/docs' }}

          # Lắp ghép biến chuẩn xác để EC2 pull đúng cục image vừa build ở trên
          IMAGE_URI: ghcr.io/${{ steps.format_vars.outputs.repo_lc }}:sha-${{ steps.format_vars.outputs.short_sha }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          # 1. Quét IP đưa vào known_hosts để lệnh ssh không bị khựng lại hỏi (y/n)
          ssh-keyscan -p "$EC2_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

          # 2. Tạo thư mục nếu chưa có và chỉ copy cấu hình (compose + env) sang server. 
          # Tại sao: Server chạy bằng Docker Image nên không cần `git pull` toàn bộ source code về nữa.
          ssh -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" "mkdir -p $EC2_APP_DIR"
          scp -P "$EC2_PORT" .env.prod docker-compose.prod.yml "$EC2_USER@$EC2_HOST:$EC2_APP_DIR/"

          # 3. Chạy script deploy qua SSH
          ssh -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" "EC2_APP_DIR='$EC2_APP_DIR' IMAGE_URI='$IMAGE_URI' GHCR_USERNAME='$GHCR_USERNAME' GHCR_TOKEN='$GHCR_TOKEN' bash -s" << 'EOF'
            set -euo pipefail
            cd "$EC2_APP_DIR"
            
            # Login và Pull image mới nhất về máy EC2
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            export APP_IMAGE="$IMAGE_URI"
            docker compose -f docker-compose.prod.yml pull app
            
            # CHẠY MIGRATE DB TRƯỚC KHI START APP
            # Tại sao: Phải chuẩn bị xong Schema (những cột/bảng mới) thì app mới chạy không bị crash. 
            # Dùng run --rm để chạy xong tự xóa container rác đi.
            docker compose -f docker-compose.prod.yml run --rm app npx prisma migrate deploy
            
            # Start app
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # Dọn dẹp
            # Tại sao: Chỉ dùng `image prune -af` để xóa image thừa. Tuyệt đối KHÔNG dùng `system prune -a` 
            # vì nó sẽ xóa nhầm cache/network của các project khác đang chạy trên cùng server này.
            docker image prune -af
          EOF

      - name: Check Health
        env:
          EC2_HEALTHCHECK_URL: ${{ secrets.EC2_HEALTHCHECK_URL || 'http://127.0.0.1:3301/api/v1/docs' }}
        run: |
          # Thêm sleep 10 giây
          # Tại sao: App NestJS/NextJS cần vài giây để boot lên và kết nối DB. 
          # Nếu gọi curl ngay lập tức sẽ bị báo lỗi connection refused.
          sleep 10
          curl -fsS "$EC2_HEALTHCHECK_URL" >/dev/null && echo "✅ Deployment Healthy!"
