name: CD Production

on:
  workflow_dispatch:
  push:
    branches:
      - production

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          EC2_SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY_GITHUB || secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          [ -n "$EC2_HOST" ] || (echo "Missing secret: EC2_HOST" && exit 1)
          [ -n "$EC2_USER" ] || (echo "Missing secret: EC2_USER" && exit 1)
          [ -n "$EC2_APP_DIR" ] || (echo "Missing secret: EC2_APP_DIR" && exit 1)
          [ -n "$EC2_SSH_PRIVATE_KEY" ] || (echo "Missing secret: SSH_PRIVATE_KEY_GITHUB (or EC2_SSH_PRIVATE_KEY)" && exit 1)

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_GITHUB || secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add EC2 host to known_hosts
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          timeout 15 bash -c "cat < /dev/null > /dev/tcp/$EC2_HOST/$EC2_PORT" || {
            echo "Cannot connect to $EC2_HOST:$EC2_PORT from GitHub runner."
            echo "Check EC2 public IP, Security Group inbound TCP $EC2_PORT, and SSH service."
            exit 1
          }
          ssh-keyscan -T 10 -p "$EC2_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT || '22' }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          EC2_HEALTHCHECK_URL: ${{ secrets.EC2_HEALTHCHECK_URL || 'http://127.0.0.1:3301/api/v1/docs' }}
        run: |
          set -euo pipefail
          ssh -p "$EC2_PORT" "$EC2_USER@$EC2_HOST" "EC2_APP_DIR='$EC2_APP_DIR' EC2_HEALTHCHECK_URL='$EC2_HEALTHCHECK_URL' bash -s" << 'EOF'
          set -euo pipefail
          cd "$EC2_APP_DIR"

          git fetch --all --prune
          git checkout production
          git pull --ff-only origin production

          if [ ! -f .env.production.local ]; then
            echo ".env.production.local not found in $EC2_APP_DIR"
            exit 1
          fi

          cp .env.production.local .env.prod
          sed -i 's/\r$//' .env.prod
          chmod 600 .env.prod

          docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build --remove-orphans
          docker compose -f docker-compose.prod.yml --env-file .env.prod exec -T app npx prisma migrate deploy
          docker compose -f docker-compose.prod.yml --env-file .env.prod ps

          curl -fsS "$EC2_HEALTHCHECK_URL" >/dev/null
          EOF
