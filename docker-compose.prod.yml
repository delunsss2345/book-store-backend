services:
  mysql:
    image: mysql:8.4
    restart: always
    env_file:
      - .env.prod
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: always
    env_file:
      - .env.prod
    command: ["sh", "-c", "redis-server --requirepass \"$${REDIS_PASSWORD}\""]
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
    restart: always
    env_file:
      - .env.prod
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "127.0.0.1:3300:3300"

volumes:
  mysql_data:
  redis_data:
