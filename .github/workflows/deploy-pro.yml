name: CD Production

on:
  workflow_dispatch:
  push:
    branches:
      - production

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_uri: ${{ steps.set-image.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:production

      - name: Set Image URI
        id: set-image
        run: echo "uri=ghcr.io/${{ github.repository }}:production" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/BookStore-EC2-SSM-Role
          aws-region: ap-southeast-1

      - name: Package deploy files
        run: |
          set -euo pipefail
          rm -rf deploy-package || true
          mkdir -p deploy-package/nginx/conf.d

          cp -r docker-compose.prod.yml deploy-package/docker-compose.yml
          cp -r nginx/conf.d deploy-package/nginx/conf.d
          printf '%s' '${{ secrets.PROD_ENV_FILE }}' > deploy-package/.env

          tar -czf deploy-package.tar.gz -C deploy-package .

      - name: Upload deploy package to S3
        run: |
          set -euo pipefail

          aws s3 cp deploy-package.tar.gz \
            s3://${{ secrets.DEPLOY_BUCKET }}/bookstore/releases/${{ github.sha }}/deploy-package.tar.gz

      - name: Deploy on EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          DEPLOY_BUCKET: ${{ secrets.DEPLOY_BUCKET }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          PORT: ${{ secrets.PORT }}
          APP_IMAGE: ${{ needs.build.outputs.image_uri }}
        run: |
          set -euo pipefail

          jq -n \
            --arg bucket "$DEPLOY_BUCKET" \
            --arg sha "${{ github.sha }}" \
            --arg app_image "$APP_IMAGE" \
            --arg ghcr_user "$GHCR_USER" \
            --arg ghcr_token "$GHCR_TOKEN" \
            --arg port "$PORT" \
            '{
              commands: [
                "set -euo pipefail",
                "mkdir -p /srv/app",
                "aws s3 cp s3://\($bucket)/bookstore/releases/\($sha)/deploy-package.tar.gz /tmp/deploy-package.tar.gz",
                "tar -xzf /tmp/deploy-package.tar.gz -C /srv/app",
                "cd /srv/app",
                "echo \($ghcr_token | @sh) | docker login ghcr.io -u \($ghcr_user | @sh) --password-stdin",
                "APP_IMAGE=\($app_image | @sh) docker compose pull",
                "APP_IMAGE=\($app_image | @sh) docker compose up -d --remove-orphans",
                "docker image prune -af",
                "curl -fsS http://127.0.0.1:\($port)/api/v1/health"
              ]
            }' > ssm-parameters.json

          COMMAND_ID="$(
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters file://ssm-parameters.json \
              --region "$AWS_REGION" \
              --query "Command.CommandId" \
              --output text
          )"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$AWS_REGION"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$AWS_REGION"
