name: CD Production

on:
  workflow_dispatch:
  push:
    branches:
      - production

concurrency:
  group: production-deploy
  # Tắt cancel-in-progress để tránh làm sập DB nếu có nhiều luồng deploy cùng lúc
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_uri: ${{ steps.set-image.outputs.uri  }} # xuất ra tags này là sha cuối cùng build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:production

      - name: Set Image URI
        id: set-image
        run: echo "uri=ghcr.io/${{ github.repository }}:production" >> $GITHUB_OUTPUT
      # build nhiều ngôn ngữ và platforms: linux/amd64,linux/arm64
      - name: Set up QEMU & Buildx
        uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Đăng nhập GHCR trên GitHub Actions
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      # Build image
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    permissions:
      contents: read
      packages: write
      id-token: write
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.ACCOUNT_ID }}:role/BookStore-GitHubActions-DeployRole
          aws-region: ap-southeast-1

      - name: Deploy on EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region "ap-southeast-1" \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy book-store-backend from GitHub Actions" \
            --parameters commands="[
              \"set -euo pipefail\",
              \"echo '${{ github.token }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin\",

              NGINX_CONF=$(cat nginx/conf.d/default.conf)
              COMPOSE_CONTENT=$(cat docker-compose.prod.yml)

              \"printf '%s' '$COMPOSE_CONTENT' > docker-compose.yml\",

              \"printf '%s' '$NGINX_CONF' > nginx/conf.d/default.conf\"

              \"printf '%s' '${{ secrets.PROD_ENV_FILE }}' > .env.prod\",

              \"docker pull '${{ needs.build.outputs.image_uri }}'\",
              \"docker rm -f '${CONTAINER_NAME}' || true\",
              \"docker compose -f docker-compose.yml up -d'\",
              \"docker image prune -af\",
              \"sleep 10\",
              \"curl -fsS 'http://127.0.0.1:${PORT}/api/v1/health'\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --region "${AWS_REGION}" \
            --command-id "$COMMAND_ID" \
            --instance-id ${INSTANCE_ID}

          aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "$COMMAND_ID" \
            --instance-id "${INSTANCE_ID}" \
            --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
            --output json
