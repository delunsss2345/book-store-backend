services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      # Đã đổi sang dùng named volume để tránh lỗi quyền ghi trên Linux
      - mysql_data:/var/lib/mysql
    ports:
      - '127.0.0.1:3306:3306'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      mysql:
        # App chỉ chạy KHI VÀ CHỈ KHI mysql đã pass cái healthcheck bên trên
        condition: service_healthy
    ports:
      - '127.0.0.1:3301:3301'

volumes:
  # Khai báo volume chính thức
  mysql_data:
