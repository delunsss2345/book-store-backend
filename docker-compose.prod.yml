services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - ./docker/mysql_data:/var/lib/mysql
    ports:
      - '127.0.0.1:3306:3306'

    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 20
  # adminer:
  #   image: adminer
  #   restart: unless-stopped
  #   ports:
  #     - '8080:8080'
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - .env.prod
    command: ['sh', '-c', 'redis-server --requirepass "$${REDIS_PASSWORD}"']
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - ./docker/redis_data:/data

  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - '127.0.0.1:3301:3301'

volumes:
  mysql_data:
  redis_data:
